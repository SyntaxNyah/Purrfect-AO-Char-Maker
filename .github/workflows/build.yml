name: Build binaries

# Compiles Pinsel for every platform on GitHub's runners.
#
#  * Every push / manual run  -> uploads downloadable artifacts per platform
#    (Actions tab -> the run -> "Artifacts").
#  * Pushing a version tag (e.g. v0.1.0) -> also creates a GitHub Release with
#    the binaries attached, and publishes the web build to GitHub Pages.
#
# Builds run INDEPENDENTLY of the test job, so you always get binaries even if a
# test fails (the test result is still shown for information).
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch: # adds a "Run workflow" button in the Actions tab

# Needed so the Release + Pages steps can write with the default token.
permissions:
  contents: write
  pages: write
  id-token: write

# Cancel superseded runs on the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.29.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter create .
      - run: flutter pub get
      # Honest signal (fails only on real errors; warnings/infos don't fail it).
      # This job does NOT gate the binary builds below — they run regardless.
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  windows:
    # Pin to the VS2022 image (windows-latest can pick a VS the CMake generator
    # can't find) and force the CMake generator so it never defaults to VS2019.
    runs-on: windows-2022
    env:
      CMAKE_GENERATOR: "Visual Studio 17 2022"
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "${{ env.FLUTTER_VERSION }}", channel: stable, cache: true }
      - run: flutter create .
      - run: flutter pub get
      - run: flutter build windows --release
      # Bundle libwebp + libwebpmux DLLs next to the .exe so WebP — including
      # ANIMATED WebP (which needs the mux library) — works out of the box.
      - name: Bundle libwebp (+mux for animated WebP)
        continue-on-error: true
        shell: pwsh
        run: |
          # vcpkg's libwebp ships the `libwebpmux` feature by default, which
          # provides WebPAnimEncoder (animated WebP) — so one install is enough.
          vcpkg install libwebp:x64-windows
          $bin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          $dst = "build\windows\x64\runner\Release"
          Get-ChildItem $bin -Filter *.dll |
            Where-Object { $_.Name -match 'webp|sharpyuv' } |
            ForEach-Object { Copy-Item $_.FullName $dst -Force }
          Write-Host "Bundled DLLs:"; Get-ChildItem $dst -Filter *.dll | Select-Object Name
          if (Get-ChildItem $dst -Filter '*webpmux*.dll') {
            Write-Host "libwebpmux bundled - animated WebP available."
          } else {
            Write-Warning "libwebpmux DLL not found - animated WebP may be unavailable on Windows."
          }
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pinsel-windows
          path: build/windows/x64/runner/Release/

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libwebp-dev
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "${{ env.FLUTTER_VERSION }}", channel: stable, cache: true }
      - run: flutter create .
      - run: flutter pub get
      - run: flutter build linux --release
      # Bundle libwebp + libwebpmux (+sharpyuv) into the app's lib/ so WebP —
      # including ANIMATED WebP (needs mux) — works out of the box. We copy the
      # versioned .so AND a plain-named copy, which is what the loader looks for
      # and which lets the mux lib resolve its libwebp dependency by soname.
      - name: Bundle libwebp (+mux for animated WebP)
        continue-on-error: true
        run: |
          sudo apt-get install -y libwebp7 libwebpmux3 libsharpyuv0 || true
          dst=build/linux/x64/release/bundle/lib
          mkdir -p "$dst"
          for stem in libsharpyuv libwebp libwebpmux; do
            for src in $(ldconfig -p | awk -v s="$stem.so" 'index($0,s){print $NF}'); do
              cp -fL "$src" "$dst/$(basename "$src")" 2>/dev/null || true
            done
            v=$(ls "$dst/$stem".so.* 2>/dev/null | head -1)
            [ -n "$v" ] && cp -f "$v" "$dst/$stem.so" || true
          done
          ls -la "$dst"
          ls "$dst" | grep -q webpmux || echo "::warning::libwebpmux not bundled — animated WebP may be unavailable on Linux"
      - uses: actions/upload-artifact@v4
        with:
          name: pinsel-linux
          path: build/linux/x64/release/bundle/

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "${{ env.FLUTTER_VERSION }}", channel: stable, cache: true }
      - run: flutter create .
      - run: flutter pub get
      - run: flutter build macos --release
      # Bundle libwebp dylibs into the .app and rewrite their install names to
      # @loader_path so they resolve each other without Homebrew on the user's
      # Mac (best-effort).
      - name: Bundle libwebp
        continue-on-error: true
        run: |
          brew install webp || true
          app=$(ls -d build/macos/Build/Products/Release/*.app | head -1)
          fw="$app/Contents/Frameworks"
          mkdir -p "$fw"
          libdir=$(brew --prefix webp 2>/dev/null)/lib
          for f in libsharpyuv libwebp libwebpmux; do
            real=$(ls "$libdir/$f."*.dylib 2>/dev/null | head -1)
            [ -n "$real" ] && cp -v "$real" "$fw/$f.dylib" || echo "missing $f"
          done
          for f in "$fw"/*.dylib; do
            [ -f "$f" ] || continue
            install_name_tool -id "@loader_path/$(basename "$f")" "$f" || true
            otool -L "$f" | awk '/webp|sharpyuv/{print $1}' | while read dep; do
              install_name_tool -change "$dep" "@loader_path/$(basename "$dep" | sed -E 's/\.[0-9]+\.dylib/.dylib/')" "$f" || true
            done
          done
          ls -la "$fw" || true
      - uses: actions/upload-artifact@v4
        with:
          name: pinsel-macos
          path: build/macos/Build/Products/Release/

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "${{ env.FLUTTER_VERSION }}", channel: stable, cache: true }
      - run: flutter create .
      - run: flutter pub get
      # Build libwebp + libwebpmux (+sharpyuv) for each ABI with the NDK and drop
      # them into jniLibs, so the APK ships with WebP — including ANIMATED WebP —
      # working out of the box. Must run before `flutter build apk`.
      - name: Build & bundle libwebp (+mux) for Android
        continue-on-error: true
        run: |
          NDK="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_HOME:-$ANDROID_NDK_ROOT}}"
          echo "Using NDK: $NDK"
          git clone --depth 1 https://chromium.googlesource.com/webm/libwebp /tmp/libwebp
          for abi in arm64-v8a armeabi-v7a x86_64; do
            cmake -S /tmp/libwebp -B "/tmp/libwebp/b-$abi" \
              -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="$abi" -DANDROID_PLATFORM=android-21 \
              -DBUILD_SHARED_LIBS=ON \
              -DWEBP_BUILD_CWEBP=OFF -DWEBP_BUILD_DWEBP=OFF -DWEBP_BUILD_GIF2WEBP=OFF \
              -DWEBP_BUILD_IMG2WEBP=OFF -DWEBP_BUILD_VWEBP=OFF -DWEBP_BUILD_WEBPINFO=OFF \
              -DWEBP_BUILD_WEBPMUX=ON -DWEBP_BUILD_ANIM_UTILS=OFF -DWEBP_BUILD_EXTRAS=OFF
            cmake --build "/tmp/libwebp/b-$abi" -j4
            dst="android/app/src/main/jniLibs/$abi"
            mkdir -p "$dst"
            find "/tmp/libwebp/b-$abi" \( -name 'libwebp.so' -o -name 'libwebpmux.so' -o -name 'libsharpyuv.so' \) -exec cp -v {} "$dst/" \;
            ls -la "$dst" || true
            ls "$dst" | grep -q webpmux || echo "::warning::libwebpmux missing for $abi — animated WebP may be unavailable"
          done
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: pinsel-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { flutter-version: "${{ env.FLUTTER_VERSION }}", channel: stable, cache: true }
      - run: flutter create .
      - run: flutter pub get
      # base-href must match the repo name for project Pages. Override if you
      # host at a domain root (use /).
      - run: flutter build web --release --base-href /Pinsel-AO-Char-Maker/
      - uses: actions/upload-artifact@v4
        with:
          name: pinsel-web
          path: build/web/
      - name: Publish website to GitHub Pages (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web

  release:
    needs: [windows, linux, macos, android, web]
    # Runs after the builds finish even if some failed, so a Release still gets
    # whatever compiled. Only on version tags.
    if: ${{ always() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - name: Zip each platform folder
        run: |
          cd dist
          for d in */; do
            [ -d "$d" ] && zip -r "${d%/}.zip" "$d"
          done
          ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
