name: pinsel
description: >-
  The Pinsel AO Char Maker — the most customizable, most automated
  Attorney Online / webAO character & button maker. Desktop, Android and iOS
  from a single codebase.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Pure-Dart image decode/encode + pixel manipulation (png, apng, gif, webp-in,
  # bmp, tga, ico, jpg, tiff, ...). The backbone of the recolour/bulk engine.
  image: ^4.3.0

  # Cross-platform file + folder picking (Windows/Linux/macOS/Android/iOS).
  file_picker: ^8.1.2

  # App-sandbox directories on mobile (frame cache, recent projects, presets).
  path_provider: ^2.1.4

  # Path joining/normalisation that behaves the same on every platform.
  path: ^1.9.0

  # Bundle import/export (.zip character packages).
  archive: ^3.6.1

  # Small, dependency-light state management used by the UI layer.
  provider: ^6.1.2

  # Custom colour wheel / picker (area, sliders, hex) for the Colour Lab.
  flutter_colorpicker: ^1.1.0

  # Misc collection helpers (natural sort, grouping).
  collection: ^1.18.0

  # Native interop for the optional libwebp encoder (lossy + lossless WebP on
  # desktop/mobile). dart:ffi is built in; this provides malloc/calloc.
  ffi: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Generates the platform launcher icons from one source PNG (see the
  # `flutter_launcher_icons` block below). Run: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/presets/

# App icon: drop a 1024×1024 PNG of the Pinsel mascot (a cute anime girl) at
# assets/icon/app_icon.png, then run `dart run flutter_launcher_icons` to write
# the Windows/macOS/Linux/Android/iOS/web icons. See assets/icon/README.md.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  ios: true
  web:
    generate: true
    background_color: "#1B1230"
    theme_color: "#B58CFF"
  windows:
    generate: true
    icon_size: 256
  macos:
    generate: true
  remove_alpha_ios: true
  background_color_ios: "#1B1230"
  # Note: a GPU fragment-shader fast-path for real-time recolour is on the
  # roadmap (see ROADMAP.md). The current build uses an efficient CPU preview
  # (downscaled, in-isolate-ready) which works on every platform including web.
